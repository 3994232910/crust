services:
  db:
    image: postgres:17
    restart: unless-stopped
    env_file: .env.prod
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file: .env.prod
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backend_avatars:/app/backend/avatars
      - backend_models:/app/backend/models
      - backend_thumbnails:/app/backend/thumbnails
    networks:
      - internal
    command: >
      bash -c "bash /app/backend/scripts/prestart.sh &&
               fastapi run --workers 2 app/main.py"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: ""
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend/nginx-prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      - backend
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  backend_avatars:
  backend_models:
  backend_thumbnails:
